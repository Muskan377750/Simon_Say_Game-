<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simon Says Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">

    <!-- HEADER -->
    <header>
      <h1>🎮 Simon Says</h1>
      <p id="status">Click Start to Play</p>
    </header>

    <!-- SCORE -->
    <section class="card score-board">
      <p>⭐ Level: <span id="level">0</span></p>
      <p>🏆 High Score: <span id="highScore">0</span></p>
    </section>

    <!-- CONTROLS -->
    <section class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="restartBtn">🔄 Restart</button>
    </section>

    <!-- SETTINGS -->
    <section class="card settings">
      <div class="setting-item">
        <label for="difficulty">⚡ Difficulty</label>
        <select id="difficulty">
          <option value="800">Easy</option>
          <option value="600" selected>Medium</option>
          <option value="400">Hard</option>
        </select>
      </div>

      <div class="setting-item">
        <input type="checkbox" id="strictMode">
        <label for="strictMode">🔥 Strict Mode</label>
      </div>
    </section>

    <!-- GAME BOARD -->
    <section class="btn-container">
      <div class="btn red" data-color="red"></div>
      <div class="btn yellow" data-color="yellow"></div>
      <div class="btn green" data-color="green"></div>
      <div class="btn purple" data-color="purple"></div>
    </section>

  </main>

  <!-- AUDIO -->
  <audio id="redSound" src="https://s3.amazonaws.com/freecodecamp/simonSound1.mp3"></audio>
  <audio id="yellowSound" src="https://s3.amazonaws.com/freecodecamp/simonSound2.mp3"></audio>
  <audio id="greenSound" src="https://s3.amazonaws.com/freecodecamp/simonSound3.mp3"></audio>
  <audio id="purpleSound" src="https://s3.amazonaws.com/freecodecamp/simonSound4.mp3"></audio>
  <audio id="wrongSound" src="https://www.myinstants.com/media/sounds/wrong-answer.mp3"></audio>

  <script src="app.js"></script>
</body>
</html>
