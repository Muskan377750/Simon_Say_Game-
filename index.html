<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simon Says Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>🎮 Simon Says</h1>
    <h2 id="status">Click Start to Play</h2>

    <!-- Score Card -->
    <div class="card score-board">
      <p>⭐ Level: <span id="level">0</span></p>
      <p>🏆 High Score: <span id="highScore">0</span></p>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="startBtn">▶ Start</button>
      <button id="restartBtn">🔄 Restart</button>
    </div>

    <!-- Difficulty + Mode -->
    <div class="card difficulty">
      <label>⚡ Difficulty:</label>
      <select id="difficulty">
        <option value="800">Easy</option>
        <option value="600" selected>Medium</option>
        <option value="400">Hard</option>
      </select>

      <label>
        <input type="checkbox" id="strictMode"> 🔥 Strict Mode
      </label>
    </div>

    <!-- Game Board -->
    <div class="btn-container">
      <div class="btn red" id="red"></div>
      <div class="btn yellow" id="yellow"></div>
      <div class="btn green" id="green"></div>
      <div class="btn purple" id="purple"></div>
    </div>
  </div>

  <!-- Sounds -->
  <audio id="redSound" src="https://s3.amazonaws.com/freecodecamp/simonSound1.mp3"></audio>
  <audio id="yellowSound" src="https://s3.amazonaws.com/freecodecamp/simonSound2.mp3"></audio>
  <audio id="greenSound" src="https://s3.amazonaws.com/freecodecamp/simonSound3.mp3"></audio>
  <audio id="purpleSound" src="https://s3.amazonaws.com/freecodecamp/simonSound4.mp3"></audio>
  <audio id="wrongSound" src="https://www.myinstants.com/media/sounds/wrong-answer.mp3"></audio>

  <script src="app.js"></script>
</body>
</html>
